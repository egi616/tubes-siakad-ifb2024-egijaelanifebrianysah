[phases.setup]
nixPkgs = ["nodejs_20", "php82", "php82Extensions.pdo_mysql", "php82Extensions.mbstring", "php82Extensions.xml"]

[phases.install]
cmds = ["composer install --no-dev --optimize-autoloader", "npm install"]

[phases.build]
cmds = ["npm run build", "php artisan config:cache", "php artisan route:cache"]

[start]
cmd = "php artisan migrate --force && php artisan serve --host=0.0.0.0 --port=8000"